name: Index Content

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/content/journey/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip3 install requests numpy

      - name: Run indexer
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: python3 scripts/index_content.py

      - name: Open PR with refreshed embeddings
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/refresh-embeddings
          base: main
          commit-message: "chore: update content embeddings"
          title: "chore: refresh content embeddings"
          body: |
            Automated re-embedding triggered by changes under `frontend/src/content/journey/`.

            - Regenerates `backend/data/chunks.json` and `backend/data/embeddings.npy`
            - Safe to merge once the build is green
          add-paths: backend/data/
          delete-branch: true
